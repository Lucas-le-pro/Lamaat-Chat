<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<title>Lamaat Chat</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --border:#30363d;
  --primary:#FFD93D; --primary-dark:#e6c235;
  --text:#e6edf3; --text-muted:#8b949e;
  --bubble-me:#1f6feb; --bubble-other:#21262d;
  --online:#3fb950; --danger:#f85149;
  --radius:14px; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}

/* ── AUTH ───────────────────────────────────────────────── */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#auth-box{margin:auto 0}
#auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:380px}
#auth-box h1{font-size:1.5rem;margin-bottom:4px;color:var(--primary)}
#auth-box p{color:var(--text-muted);font-size:.85rem;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.82rem;color:var(--text-muted);margin-bottom:5px}
.field input{width:100%;background:#0d1117;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:1rem;outline:none}
.field input:focus{border-color:var(--primary)}
.avatar-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.av-opt{font-size:1.4rem;cursor:pointer;padding:4px;border-radius:6px;border:2px solid transparent;transition:border-color .15s}
.av-opt.selected{border-color:var(--primary)}
.btn{width:100%;background:var(--primary);color:#000;border:none;padding:11px;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
.btn:active{background:var(--primary-dark)}
.auth-switch{text-align:center;margin-top:12px;font-size:.85rem;color:var(--text-muted)}
.auth-switch a{color:var(--primary);cursor:pointer;text-decoration:none}
.err{color:var(--danger);font-size:.82rem;margin-top:6px;min-height:18px}
.av-img{width:28px;height:28px;border-radius:50%;object-fit:cover;vertical-align:middle;flex-shrink:0}
.av-opt img{width:32px;height:32px;border-radius:50%;object-fit:cover}
.av-upload-label{display:inline-flex;align-items:center;gap:5px;font-size:.82rem;background:#21262d;border:1px dashed var(--border);color:var(--text-muted);padding:6px 10px;border-radius:6px;cursor:pointer;transition:border-color .15s,color .15s}
.av-upload-label:hover{border-color:var(--primary);color:var(--primary)}
#avatar-preview{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);display:none}
.emoji-color-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color .15s;flex-shrink:0}
.emoji-color-btn.selected{border-color:var(--primary);box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--primary)}
.emoji-opt-btn{font-size:1.15rem;cursor:pointer;padding:3px 6px;border-radius:6px;border:2px solid transparent;background:#0d1117;transition:border-color .15s,background .15s}
.emoji-opt-btn.selected{border-color:var(--primary);background:#1a1f25}

/* ── LAYOUT ─────────────────────────────────────────────── */
#app{display:none;height:100%;flex-direction:column}
#app.visible{display:flex}

/* Mobile : sidebar en overlay */
#layout{display:flex;flex:1;overflow:hidden}
#sidebar{
  width:280px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform .25s;
}
@media(max-width:640px){
  #sidebar{position:fixed;inset:0;right:auto;z-index:50;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;display:none}
  #overlay.visible{display:block}
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar-header{padding:14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
#my-avatar{font-size:1.4rem}
#my-name{font-weight:600;flex:1}
#btn-logout{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;padding:4px}
#btn-logout:hover{color:var(--danger)}

#rooms-list{flex:1;overflow-y:auto;padding:8px 0}
.room-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;
  border-radius:8px;margin:2px 6px;transition:background .15s;position:relative;
}
.room-item:hover,.room-item.active{background:rgba(255,255,255,0.05)}
.room-item.active{background:rgba(255,211,61,0.1)}
.room-icon{font-size:1.3rem;flex-shrink:0}
.room-info{flex:1;min-width:0}
.room-name{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-last{font-size:.75rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-unread{background:var(--primary);color:#000;border-radius:10px;padding:1px 7px;font-size:.72rem;font-weight:700;flex-shrink:0}

#sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px}
#sidebar-footer button{flex:1;background:#21262d;border:1px solid var(--border);color:var(--text);padding:7px;border-radius:8px;cursor:pointer;font-size:.8rem}
#sidebar-footer button:hover{border-color:var(--primary);color:var(--primary)}

/* ── CHAT ────────────────────────────────────────────────── */
#chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
#chat-header{
  padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
#btn-menu{display:none;background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:4px}
@media(max-width:640px){#btn-menu{display:block}}
#chat-room-name{font-weight:600;flex:1}
#chat-members-count{font-size:.82rem;color:var(--text);background:#21262d;border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap;transition:background .15s}
#chat-members-count:hover{background:#2d333b}

#messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg-group{display:flex;flex-direction:column;gap:2px;max-width:80%}
.msg-group.me{align-self:flex-end;align-items:flex-end}
.msg-group.other{align-self:flex-start;align-items:flex-start}
.msg-sender{font-size:.72rem;color:var(--text-muted);margin-bottom:2px;padding:0 4px}
.msg-bubble{
  padding:8px 12px;border-radius:18px;font-size:.92rem;line-height:1.4;
  word-break:break-word;max-width:100%;
}
.msg-group.me .msg-bubble{background:var(--bubble-me);border-bottom-right-radius:4px;color:#fff}
.msg-group.other .msg-bubble{background:var(--bubble-other);border-bottom-left-radius:4px}
.msg-time{font-size:.65rem;color:var(--text-muted);padding:0 4px}
.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;padding:2px 4px}
.reaction-btn{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:2px 7px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:3px;transition:background .15s}
.reaction-btn.mine{background:rgba(88,166,255,.18);border-color:var(--primary)}
.reaction-btn:hover{background:var(--border)}
.react-picker{position:fixed;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:6px 8px;display:flex;gap:6px;font-size:1.2rem;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.react-trigger{display:none;position:absolute;top:-12px;right:4px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:1px 5px;cursor:pointer;font-size:.8rem;line-height:1.4;z-index:10}
.msg-bubble{position:relative}
.msg-bubble:hover .react-trigger{display:block}
.msg-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;z-index:900;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.msg-menu button{display:block;width:100%;padding:10px 16px;background:none;border:none;color:var(--text);font-size:.88rem;cursor:pointer;text-align:left;white-space:nowrap}
.msg-menu button:hover{background:#2d333b}
.msg-hidden-placeholder{font-size:.82rem;color:var(--text-muted);font-style:italic;padding:6px 10px;background:var(--surface);border:1px dashed var(--border);border-radius:12px;cursor:pointer}
.msg-hidden-placeholder:hover{color:var(--primary)}

.date-sep{text-align:center;font-size:.72rem;color:var(--text-muted);margin:8px 0;position:relative}
.date-sep::before,.date-sep::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border)}
.date-sep::before{left:0} .date-sep::after{right:0}

#typing-indicator{padding:4px 12px;font-size:.78rem;color:var(--text-muted);min-height:20px;font-style:italic}
#new-msg-indicator{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:6px 16px;border-radius:20px;font-size:.82rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:10}

#input-bar{
  padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:8px;
}
#msg-input{
  flex:1;background:#0d1117;border:1px solid var(--border);color:var(--text);
  padding:9px 12px;border-radius:20px;font-size:.95rem;outline:none;resize:none;
  max-height:120px;overflow-y:auto;font-family:var(--font);line-height:1.4;
}
#msg-input:focus{border-color:var(--primary)}
#btn-send{
  background:var(--primary);color:#000;border:none;width:38px;height:38px;
  border-radius:50%;cursor:pointer;font-size:1.1rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#btn-send:active{background:var(--primary-dark)}

/* ── EMPTY STATE ─────────────────────────────────────────── */
#empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:10px}
#empty-chat .big{font-size:3rem}

/* ── MODALS ──────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:100%;max-width:360px;margin:auto 0}
.modal h3{margin-bottom:14px;color:var(--primary)}
.modal input{width:100%;background:#0d1117;border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:.95rem;outline:none;margin-bottom:10px}
.modal input:focus{border-color:var(--primary)}
.modal .btn-row{display:flex;gap:8px;margin-top:4px}
.modal .btn-row button{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600}
.modal .btn-row .ok{background:var(--primary);color:#000}
.modal .btn-row .cancel{background:#21262d;color:var(--text);border:1px solid var(--border)}
.user-list{max-height:200px;overflow-y:auto;margin-bottom:10px}
.user-list{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.user-item{
  display:flex;align-items:center;gap:10px;padding:11px 12px;
  cursor:pointer;border-bottom:1px solid var(--border);
  background:var(--bg);transition:background .15s;user-select:none;
}
.user-item:last-child{border-bottom:none}
.user-item:hover{background:#161b22}
.user-item.selected{background:#0f1e0f}
.user-item .u-name{flex:1;font-size:.95rem;font-weight:500}
.user-item .u-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;transition:background .15s,border-color .15s}
.user-item.selected .u-check{background:var(--primary);border-color:var(--primary);color:#000}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.online-dot.on{background:var(--online)}
.dm-btn{background:var(--primary);color:#000;border:none;border-radius:6px;padding:5px 12px;font-size:.8rem;font-weight:700;cursor:pointer;flex-shrink:0}
.dm-btn:active{background:var(--primary-dark)}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#21262d;border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:20px;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none}
#toast.show{opacity:1}

/* ── VOICE MESSAGE ───────────────────────────────────────── */
.msg-audio audio{max-width:100%;width:210px;height:36px;outline:none;border-radius:20px;display:block}
#btn-voice{background:none;border:none;color:var(--text-muted);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.2rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s}
#btn-voice:hover{color:var(--primary)}
#btn-voice.recording{color:var(--danger);background:rgba(248,81,73,0.12);animation:pulse .9s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}


</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div id="auth-box">
    <h1>💬 Lamaat Chat</h1>
    <p id="auth-subtitle">Connecte-toi pour rejoindre tes potes</p>

    <div id="form-login">
      <div class="field"><label>Pseudo</label><input id="l-user" type="text" autocomplete="username" placeholder="Ton pseudo" autocorrect="off" autocapitalize="none" spellcheck="false"></div>
      <div class="field"><label>Mot de passe</label><input id="l-pass" type="password" autocomplete="current-password" placeholder="••••••"></div>
      <div class="err" id="l-err"></div>
      <button class="btn" onclick="doLogin()">Connexion</button>
      <div class="auth-switch">Pas de compte ? <a onclick="showRegister()">S'inscrire</a></div>
    </div>

    <div id="form-register" style="display:none">
      <div class="field"><label>Pseudo (2-20 caractères)</label><input id="r-user" type="text" autocomplete="username" placeholder="Ton pseudo" autocorrect="off" autocapitalize="none" spellcheck="false"></div>
      <div class="field"><label>Mot de passe</label><input id="r-pass" type="password" autocomplete="new-password" placeholder="Min 4 caractères"></div>
      <div class="field"><label>Ton avatar</label>
        <div class="avatar-row" id="avatar-row"></div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
          <label class="av-upload-label">📷 Photo<input id="r-avatar-file" type="file" accept="image/*" style="display:none" onchange="onAvatarFile(this)"></label>
          <button type="button" class="av-upload-label" onclick="openEmojiBuilder()" style="border-style:dashed">🎨 Créer emoji</button>
          <img id="avatar-preview" src="" alt="preview">
        </div>
      </div>
      <div class="err" id="r-err"></div>
      <button class="btn" onclick="doRegister()">Créer le compte</button>
      <div class="auth-switch">Déjà inscrit ? <a onclick="showLogin()">Se connecter</a></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="overlay" onclick="closeSidebar()"></div>
  <div id="layout">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-header">
        <div id="my-avatar">😀</div>
        <div id="my-name">—</div>
        <button id="btn-logout" title="Déconnexion" onclick="doLogout()">⏻</button>
      </div>
      <div style="padding:8px 10px;border-bottom:1px solid var(--border)">
        <input id="sidebar-search" type="text" placeholder="🔍 Rechercher..."
          oninput="filterSidebar(this.value)"
          style="width:100%;background:#21262d;border:1px solid #444d56;color:var(--text);
                 padding:8px 12px;border-radius:20px;font-family:var(--font);font-size:.85rem;
                 outline:none;transition:border-color .2s"
          onfocus="this.style.borderColor='#FFD93D'" onblur="this.style.borderColor='#444d56'">
      </div>
      <div id="rooms-list"></div>
      <div id="sidebar-footer">
        <button onclick="openNewGroup()">+ Groupe</button>
        <button onclick="openNewDM()">+ Message privé</button>
      </div>
    </div>

    <!-- CHAT -->
    <div id="chat-panel">
      <div id="chat-header">
        <button id="btn-menu" onclick="openSidebar()">☰</button>
        <div id="chat-room-name">Sélectionne un salon</div>
        <div id="chat-members-count" style="cursor:pointer" onclick="openMembersList()"></div>
        <button id="btn-add-member" title="Ajouter un membre" onclick="openAddMember()" style="display:none">➕</button>
      </div>

      <div id="messages"></div>
      <div id="new-msg-indicator" onclick="scrollToBottom()" style="display:none">⬇ nouveau message</div>
      <div id="typing-indicator"></div>

      <div id="input-bar">
        <textarea id="msg-input" placeholder="Message..." rows="1" oninput="autoResize(this)" onkeydown="onKey(event)"></textarea>
        <button id="btn-voice" title="Message vocal" onclick="toggleVoiceRecord()">🎤</button>
        <button id="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL GROUPE -->
<div class="modal-bg" id="modal-group" style="display:none">
  <div class="modal">
    <h3>Nouveau groupe</h3>
    <input id="group-name" type="text" placeholder="Nom du groupe">
    <div style="position:relative;margin-bottom:8px">
      <input id="group-search" type="text" placeholder="🔍 Rechercher un membre..." oninput="filterGroupUsers(this.value)" style="padding-right:36px">
    </div>
    <div class="user-list" id="group-user-list"></div>
    <div class="btn-row">
      <button class="cancel" onclick="closeModal('modal-group')">Annuler</button>
      <button class="ok" onclick="createGroup()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL DM -->
<div class="modal-bg" id="modal-dm" style="display:none">
  <div class="modal">
    <h3>Message privé</h3>
    <input id="dm-search" type="text" placeholder="🔍 Rechercher..." oninput="filterDMUsers(this.value)">
    <div class="user-list" id="dm-user-list"></div>
    <div class="btn-row">
      <button class="cancel" onclick="closeModal('modal-dm')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL EMOJI BUILDER -->
<div class="modal-bg" id="modal-emoji" style="display:none">
  <div class="modal" style="max-width:420px">
    <h3>🎨 Créer mon emoji</h3>
    <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap">
      <canvas id="emoji-canvas" width="128" height="128" style="border-radius:50%;border:3px solid var(--border);flex-shrink:0"></canvas>
      <div style="flex:1;min-width:180px;display:flex;flex-direction:column;gap:10px">
        <div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:5px">Couleur</div>
          <div id="emoji-colors" style="display:flex;flex-wrap:wrap;gap:6px"></div>
        </div>
        <div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:5px">Expression</div>
          <div id="emoji-expressions" style="display:flex;flex-wrap:wrap;gap:4px"></div>
        </div>
        <div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:5px">Accessoire</div>
          <div id="emoji-accessories" style="display:flex;flex-wrap:wrap;gap:4px"></div>
        </div>
        <div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:5px">Texte (1–3 lettres)</div>
          <input id="emoji-text" type="text" maxlength="6" placeholder="ex: AB ou LOL"
            oninput="emojiBuilder.text=this.value;drawEmojiBuilder()"
            style="width:100%;background:#0d1117;border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:.9rem;outline:none">
        </div>
        <div>
          <div style="font-size:.75rem;color:var(--text-muted);margin-bottom:5px">Position du texte</div>
          <div id="emoji-textpos" style="display:flex;gap:4px"></div>
        </div>
      </div>
    </div>
    <div class="btn-row" style="margin-top:14px">
      <button class="cancel" onclick="closeModal('modal-emoji')">Annuler</button>
      <button class="ok" onclick="validateEmojiBuilder()">Utiliser cet emoji ✓</button>
    </div>
  </div>
</div>


<div class="modal-bg" id="modal-add-member" style="display:none">
  <div class="modal">
    <h3>Ajouter un membre</h3>
    <div class="user-list" id="add-member-list"></div>
    <div class="btn-row"><button class="cancel" onclick="closeModal('modal-add-member')">Annuler</button></div>
  </div>
</div>

<div class="modal-bg" id="modal-members" style="display:none">
  <div class="modal">
    <h3>Membres</h3>
    <div class="user-list" id="members-list"></div>
    <div class="btn-row"><button class="cancel" onclick="closeModal('modal-members')">Fermer</button></div>
  </div>
</div>

<div id="kick-notif" style="display:none;position:fixed;top:0;left:0;right:0;z-index:600;background:#1a1a2e;border-bottom:2px solid var(--danger);padding:12px 16px;text-align:center">
  <div id="kick-notif-text" style="margin-bottom:8px;font-size:.95rem"></div>
  <div style="display:flex;gap:8px;justify-content:center">
    <button onclick="respondKick(true)" style="background:var(--danger);color:#fff;border:none;padding:6px 18px;border-radius:6px;cursor:pointer">Quitter</button>
    <button onclick="respondKick(false)" style="background:var(--bg-secondary);border:1px solid var(--border);color:var(--text);padding:6px 18px;border-radius:6px;cursor:pointer">Refuser</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════
let me = null;         // utilisateur connecté
let socket = null;
let rooms  = [];
let currentRoomId = null;
let onlineIds = new Set();
let typingTimers = {};
let selectedAvatar = '😀';
let hiddenMessages = new Set(JSON.parse(localStorage.getItem('hiddenMsgs')||'[]'));

const AVATARS = [
  '😀','😄','😂','🥹','😎','🤩','🥸','🥷','🧙','🧝','🧛','🧟',
  '🦊','🐼','🐸','👾','🤖','🦁','🐯','🐻','🐨','🐺','🦝','🐙','🐱','🐶',
  '🦋','🐉','🦄','🐬','🦅','🦜','🐧','🦔','🐊','🦀','🐙','🦑',
  '🌸','🌟','💎','🔥','⚡','🍀','🎮','🎸','🚀','🌈','🎯','🏆',
];

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
function showLogin(){ document.getElementById('form-login').style.display=''; document.getElementById('form-register').style.display='none'; document.getElementById('auth-subtitle').textContent='Connecte-toi pour rejoindre tes potes'; }
function showRegister(){
  document.getElementById('form-login').style.display='none';
  document.getElementById('form-register').style.display='';
  document.getElementById('auth-subtitle').textContent='Crée ton compte et rejoins tes potes';
  buildAvatarRow();
}

function renderAvatar(av, extraCls=''){
  if(av && (av.startsWith('data:') || av.startsWith('http'))){
    const d = document.createElement('div'); d.textContent = av;
    return `<img src="${d.innerHTML}" class="av-img ${extraCls}" alt="avatar">`;
  }
  return av || '👤';
}

function setCustomAvatar(dataUrl, onClickCb){
  selectedAvatar = dataUrl;
  document.querySelectorAll('.av-opt').forEach(s => s.classList.remove('selected'));
  document.getElementById('avatar-preview').style.display = 'none';
  const row = document.getElementById('avatar-row');
  let slot = row.querySelector('.av-opt-custom');
  if(!slot){
    slot = document.createElement('span');
    slot.className = 'av-opt av-opt-custom';
    row.appendChild(slot);
  }
  slot.innerHTML = `<img src="${dataUrl}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;display:block">`;
  slot.classList.add('selected');
  slot.onclick = onClickCb;
}

function onAvatarFile(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 64;
      const ctx = canvas.getContext('2d');
      const s = Math.min(img.width, img.height);
      const ox = (img.width - s) / 2, oy = (img.height - s) / 2;
      ctx.drawImage(img, ox, oy, s, s, 0, 0, 64, 64);
      setCustomAvatar(canvas.toDataURL('image/jpeg', 0.75), () => document.getElementById('r-avatar-file').click());
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function buildAvatarRow(){
  const row = document.getElementById('avatar-row');
  row.innerHTML = '';
  for(const av of AVATARS){
    const span = document.createElement('span');
    span.className = 'av-opt' + (av===selectedAvatar?' selected':'');
    span.textContent = av;
    span.onclick = ()=>{
      selectedAvatar = av;
      document.querySelectorAll('.av-opt').forEach(s=>s.classList.remove('selected'));
      span.classList.add('selected');
      const prev = document.getElementById('avatar-preview');
      prev.src=''; prev.style.display='none';
      document.getElementById('r-avatar-file').value='';
    };
    row.appendChild(span);
  }
}

async function doLogin(){
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  document.getElementById('l-err').textContent='';
  const res = await api('POST','/api/login',{username,password});
  if(res.error){ document.getElementById('l-err').textContent=res.error; return; }
  me = res.user;
  enterApp();
}

async function doRegister(){
  const username = document.getElementById('r-user').value.trim();
  const password = document.getElementById('r-pass').value;
  document.getElementById('r-err').textContent='';
  const res = await api('POST','/api/register',{username,password,avatar:selectedAvatar});
  if(res.error){ document.getElementById('r-err').textContent=res.error; return; }
  me = res.user;
  enterApp();
}

async function doLogout(){
  if(!confirm('Se déconnecter ?')) return;
  await api('POST','/api/logout');
  if(socket) socket.disconnect();
  me=null; currentRoomId=null; rooms=[];
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth').style.display='flex';
}

// ═══════════════════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════════════════
async function enterApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('my-avatar').innerHTML = renderAvatar(me.avatar);
  document.getElementById('my-name').textContent   = me.username;
  await loadRooms();
  connectSocket();
}

async function checkSession(){
  const res = await api('GET','/api/me');
  if(res.id){ me=res; enterApp(); }
}

async function loadRooms(){
  const data = await api('GET','/api/rooms');
  if(!Array.isArray(data)) return;
  rooms = data;
  renderRoomList();
}

// ═══════════════════════════════════════════════════
// SOCKET.IO
// ═══════════════════════════════════════════════════
function connectSocket(){
  const token = getCookie('token');
  socket = io({ auth:{ token } });

  socket.on('connect_error', e => console.warn('Socket error:', e.message));

  socket.on('message', msg => {
    if(msg.room_id === currentRoomId) appendMessage(msg);
    if(msg.room_id !== currentRoomId) markUnread(msg.room_id);
    updateRoomPreview(msg);
    // Vibration courte si message pas de moi
    if(msg.user_id !== me.id && navigator.vibrate) navigator.vibrate(80);
  });

  socket.on('online', ids => {
    onlineIds = new Set(ids);
    renderRoomList();
  });

  socket.on('room_added', room => {
    // Ne pas dupliquer si déjà dans la liste
    if (rooms.find(r => r.id === room.id)) return;
    rooms.unshift({ ...room, _unread: 0 });
    renderRoomList();
  });

  socket.on('typing', ({userId, username, typing})=>{
    if(!typing){ clearTyping(userId); return; }
    showTyping(userId, username);
    clearTimeout(typingTimers[userId]);
    typingTimers[userId] = setTimeout(()=>clearTyping(userId), 3000);
  });

  socket.on('reactions_update', ({messageId, reactions})=>{
    renderReactions(messageId, reactions);
  });

  socket.on('kick_incoming', ({roomId, roomName, fromName})=>{
    pendingKickRoomId = roomId;
    document.getElementById('kick-notif-text').textContent = `${fromName} veut vous retirer du salon "${roomName}"`;
    document.getElementById('kick-notif').style.display='';
  });

  socket.on('kick_done', ({roomId})=>{
    rooms = rooms.filter(r=>r.id!==roomId);
    if(currentRoomId===roomId){ currentRoomId=null; document.getElementById('messages').innerHTML=''; document.getElementById('chat-room-name').textContent='Sélectionne un salon'; document.getElementById('chat-members-count').textContent=''; }
    renderRoomList();
    toast('Tu as quitté le salon');
  });

  socket.on('kick_done_offline', ({username})=>{
    toast(`${username} a été retiré du salon`);
  });

  socket.on('message_deleted', ({messageId})=>{
    const bubble = document.querySelector(`.msg-bubble[data-msg-id="${messageId}"]`);
    if(!bubble) return;
    const group = bubble.closest('.msg-group');
    // Supprimer la bulle + sa zone réactions + son time si c'est le seul msg du groupe
    const reactZone = document.getElementById(`reactions-${messageId}`);
    bubble.remove();
    reactZone?.remove();
    // Si le groupe est vide (plus de bulles), retirer le groupe entier
    if(group && !group.querySelector('.msg-bubble')) group.remove();
  });

  socket.on('kick_refused', ({username})=>{
    toast(`${username} a refusé de quitter le salon`);
  });

  socket.on('member_left', ({userId, username, roomId})=>{
    if(userId!==me.id) toast(`${username} a quitté le salon`);
    // Rafraîchir le compteur si on est dans ce salon
    if(currentRoomId===roomId) refreshMembersCount();
  });

}

// ═══════════════════════════════════════════════════
// SALONS
// ═══════════════════════════════════════════════════
function renderRoomList(){
  const list = document.getElementById('rooms-list');
  list.innerHTML='';
  for(const r of rooms){
    const div = document.createElement('div');
    div.className = 'room-item' + (r.id===currentRoomId?' active':'');
    div.dataset.id = r.id;

    const icon = getRoomIcon(r);
    const displayName = getRoomDisplayName(r);

    div.innerHTML = `
      <div class="room-icon">${renderAvatar(icon)}</div>
      <div class="room-info">
        <div class="room-name">${esc(displayName)}</div>
        <div class="room-last" id="room-last-${r.id}"></div>
      </div>
      ${r._unread?`<div class="room-unread">${r._unread}</div>`:''}
    `;
    div.onclick = ()=>{ openRoom(r.id); closeSidebar(); };
    list.appendChild(div);
  }
}

function getRoomDisplayName(r){
  if(!r.is_dm) return r.name;
  return r._otherName || 'Message privé';
}

function getRoomIcon(r){
  if(!r.is_dm) return r.name==='Général' ? '📢' : '💬';
  return r._otherAvatar || '👤';
}

function filterSidebar(q){
  const query = q.toLowerCase().trim();
  document.querySelectorAll('#rooms-list .room-item').forEach(item => {
    const name = item.querySelector('.room-name')?.textContent.toLowerCase() || '';
    item.style.display = (!query || name.includes(query)) ? '' : 'none';
  });
}

function updateRoomPreview(msg){
  const el = document.getElementById(`room-last-${msg.room_id}`);
  if(el) el.textContent = `${msg.username}: ${msg.content}`.slice(0,40);
}

function markUnread(roomId){
  const r = rooms.find(x=>x.id===roomId);
  if(!r) return;
  r._unread = (r._unread||0)+1;
  renderRoomList();
}

async function openRoom(roomId){
  currentRoomId = roomId;
  const r = rooms.find(x=>x.id===roomId);
  if(r) r._unread=0;
  renderRoomList();

  document.getElementById('chat-room-name').textContent = r ? getRoomDisplayName(r) : '—';
  document.getElementById('messages').innerHTML='';
  document.getElementById('typing-indicator').textContent='';

  const msgs = await api('GET',`/api/rooms/${roomId}/messages`);
  if(Array.isArray(msgs)) renderMessages(msgs);

  const members = await api('GET',`/api/rooms/${roomId}/members`);
  if(Array.isArray(members)){
    const onlineCount = members.filter(m=>onlineIds.has(m.id)).length;
    document.getElementById('chat-members-count').textContent = `👥 ${members.length} membres • ${onlineCount} en ligne`;
  }

  // Bouton ➕ visible uniquement pour le créateur d'un groupe
  const addBtn = document.getElementById('btn-add-member');
  if(r && !r.is_dm && r.created_by === me.id) addBtn.style.display='';
  else addBtn.style.display='none';

  document.getElementById('msg-input').focus();
}

// ═══════════════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════════════
let lastRenderedDate = null;
let lastRenderedUser = null;

function renderMessages(msgs){
  document.getElementById('messages').innerHTML='';
  lastRenderedDate=null; lastRenderedUser=null;
  for(const m of msgs) appendMessage(m, true);
  scrollToBottom();
}

function appendMessage(msg, noScroll){
  const box = document.getElementById('messages');
  const wasAtBottom = isAtBottom();
  const date = new Date(msg.sent_at*1000);
  const dateStr = date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  // Séparateur de date
  if(dateStr !== lastRenderedDate){
    const sep = document.createElement('div');
    sep.className='date-sep'; sep.textContent=dateStr;
    box.appendChild(sep);
    lastRenderedDate=dateStr;
    lastRenderedUser=null;
  }

  const isMe = msg.user_id === me.id;
  const sameUser = msg.user_id === lastRenderedUser;

  // Regrouper les messages consécutifs du même auteur
  let group = !sameUser ? null : box.querySelector(`.msg-group[data-uid="${msg.user_id}"]:last-child`);
  if(!group || !sameUser){
    group = document.createElement('div');
    group.className = `msg-group ${isMe?'me':'other'}`;
    group.dataset.uid = msg.user_id;
    if(!isMe && !sameUser){
      const sender = document.createElement('div');
      sender.className='msg-sender';
      sender.textContent=msg.username || '?';
      group.appendChild(sender);
    }
    box.appendChild(group);
    lastRenderedUser = msg.user_id;
  }

  const bubble = document.createElement('div');
  bubble.className='msg-bubble';
  bubble.dataset.msgId = msg.id;
  bubble.dataset.roomId = msg.room_id;

  if(hiddenMessages.has(msg.id)){
    // Afficher placeholder directement
    const ph = document.createElement('span');
    ph.className='msg-hidden-placeholder';
    ph.textContent='Message masqué • Afficher';
    bubble.style.display='none';
    group.appendChild(bubble);
    group.appendChild(ph);
    ph.onclick=()=>showMsg(msg.id, bubble, ph);
  } else {
    if(msg.content.startsWith('data:audio/')){
      bubble.classList.add('msg-audio');
      const audio = document.createElement('audio');
      audio.src = msg.content;
      audio.controls = true;
      bubble.appendChild(audio);
    } else {
      bubble.textContent = msg.content;
    }

    // Clic droit / long-press → menu contextuel
    let pressTimer = null;
    bubble.addEventListener('contextmenu', e => { e.preventDefault(); showMsgMenu(e, msg.id, msg.room_id, isMe); });
    bubble.addEventListener('touchstart', () => { pressTimer = setTimeout(() => showMsgMenuTouch(msg.id, msg.room_id, isMe), 500); }, {passive:true});
    bubble.addEventListener('touchend', () => clearTimeout(pressTimer), {passive:true});
    bubble.addEventListener('touchmove', () => clearTimeout(pressTimer), {passive:true});

    // Bouton réaction au survol
    const trigger = document.createElement('span');
    trigger.className='react-trigger';
    trigger.textContent='😊';
    trigger.onclick = e => { e.stopPropagation(); showReactPicker(e, msg.id); };
    bubble.appendChild(trigger);

    group.appendChild(bubble);
  }

  // Zone réactions
  const reactZone = document.createElement('div');
  reactZone.className='msg-reactions';
  reactZone.id=`reactions-${msg.id}`;
  group.appendChild(reactZone);

  const time = document.createElement('div');
  time.className='msg-time';
  time.textContent=date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  group.appendChild(time);

  if(!noScroll){
    const isMe = msg.user_id === me.id;
    if(isMe || wasAtBottom) scrollToBottom();
    else document.getElementById('new-msg-indicator').style.display='';
  }
}

const REACT_EMOJIS = ['👍','❤️','😂','😮','😢','🔥','🎉','👏'];
let reactPicker = null;

function showReactPicker(e, msgId){
  if(reactPicker) reactPicker.remove();
  const picker = document.createElement('div');
  picker.className='react-picker';
  REACT_EMOJIS.forEach(emoji => {
    const btn = document.createElement('span');
    btn.textContent=emoji; btn.style.cursor='pointer';
    btn.onclick = ev => { ev.stopPropagation(); socket.emit('react',{messageId:msgId,emoji,roomId:currentRoomId}); picker.remove(); reactPicker=null; };
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);
  picker.style.left = Math.min(e.clientX, window.innerWidth-picker.offsetWidth-10)+'px';
  picker.style.top  = (e.clientY - 50)+'px';
  reactPicker = picker;
}

function renderReactions(messageId, reactions){
  const zone = document.getElementById(`reactions-${messageId}`);
  if(!zone) return;
  zone.innerHTML='';
  for(const r of reactions){
    const userIds = r.user_ids.split(',').map(Number);
    const btn = document.createElement('button');
    btn.className='reaction-btn'+(userIds.includes(me.id)?' mine':'');
    btn.innerHTML=`${r.emoji} <span>${r.count}</span>`;
    btn.title=`${r.count} réaction${r.count>1?'s':''}`;
    btn.onclick=()=>socket.emit('react',{messageId,emoji:r.emoji,roomId:currentRoomId});
    zone.appendChild(btn);
  }
}

function isAtBottom(){
  const box=document.getElementById('messages');
  return box.scrollHeight - box.scrollTop - box.clientHeight < 60;
}

function scrollToBottom(){
  const box=document.getElementById('messages');
  box.scrollTop=box.scrollHeight;
  document.getElementById('new-msg-indicator').style.display='none';
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('messages').addEventListener('scroll',()=>{
    if(isAtBottom()) document.getElementById('new-msg-indicator').style.display='none';
  });
  document.addEventListener('click', ()=>{ if(reactPicker){ reactPicker.remove(); reactPicker=null; } });
});

// ═══════════════════════════════════════════════════
// ENVOI
// ═══════════════════════════════════════════════════
let typingSent = false;
let typingClearTimer = null;

function sendMessage(){
  if(!currentRoomId||!socket) return;
  const input=document.getElementById('msg-input');
  const content=input.value.trim();
  if(!content) return;
  socket.emit('send_message',{roomId:currentRoomId,content});
  input.value=''; autoResize(input);
  socket.emit('typing',{roomId:currentRoomId,typing:false});
  typingSent=false;
}

function onKey(e){
  // Envoi avec Entrée (sans Shift)
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); return; }
  // Indicateur de frappe
  if(!typingSent&&socket&&currentRoomId){
    socket.emit('typing',{roomId:currentRoomId,typing:true}); typingSent=true;
  }
  clearTimeout(typingClearTimer);
  typingClearTimer=setTimeout(()=>{
    if(socket&&currentRoomId) socket.emit('typing',{roomId:currentRoomId,typing:false});
    typingSent=false;
  },2000);
}

function autoResize(el){
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ═══════════════════════════════════════════════════
// TYPING
// ═══════════════════════════════════════════════════
const typingUsers={};
function showTyping(userId,username){
  typingUsers[userId]=username;
  renderTyping();
}
function clearTyping(userId){
  delete typingUsers[userId];
  renderTyping();
}
function renderTyping(){
  const names=Object.values(typingUsers);
  const el=document.getElementById('typing-indicator');
  if(!names.length){el.textContent='';return;}
  el.textContent=names.length===1?`${names[0]} est en train d'écrire…`:`${names.join(', ')} écrivent…`;
}

// ═══════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════
async function openNewGroup(){
  const users = await api('GET','/api/users');
  const list = document.getElementById('group-user-list');
  list.innerHTML='';
  for(const u of users){
    if(u.id===me.id) continue;
    const item=document.createElement('div');
    item.className='user-item';
    item.dataset.uid=u.id;
    const on=onlineIds.has(u.id);
    item.innerHTML=`
      <span style="font-size:1.3rem">${renderAvatar(u.avatar)}</span>
      <span class="u-name">${esc(u.username)}</span>
      <div class="online-dot ${on?'on':''}" title="${on?'En ligne':'Hors ligne'}"></div>
      <div class="u-check">✓</div>
    `;
    item.onclick=()=>item.classList.toggle('selected');
    list.appendChild(item);
  }
  document.getElementById('group-name').value='';
  document.getElementById('group-search').value='';
  document.getElementById('modal-group').style.display='flex';
  document.getElementById('group-search').focus();
}

function filterGroupUsers(q){
  const query=q.toLowerCase().trim();
  document.querySelectorAll('#group-user-list .user-item').forEach(item=>{
    const name=item.querySelector('.u-name').textContent.toLowerCase();
    item.style.display=(!query||name.includes(query))?'':'none';
  });
}

async function createGroup(){
  const name=document.getElementById('group-name').value.trim();
  if(!name){toast('Entre un nom de groupe');return;}
  const checked=[...document.querySelectorAll('#group-user-list .user-item.selected')].map(i=>parseInt(i.dataset.uid));
  const res=await api('POST','/api/rooms',{name,members:checked});
  if(res.error){toast(res.error);return;}
  rooms.unshift({...res,is_dm:0,_unread:0});
  renderRoomList();
  socket.emit('join_room',res.id);
  openRoom(res.id);
  closeModal('modal-group');
}

async function openNewDM(){
  const users = await api('GET','/api/users');
  const list=document.getElementById('dm-user-list');
  list.innerHTML='';
  for(const u of users){
    if(u.id===me.id) continue;
    const item=document.createElement('div');
    item.className='user-item';
    const on=onlineIds.has(u.id);
    item.innerHTML=`
      <span style="font-size:1.3rem">${renderAvatar(u.avatar)}</span>
      <span class="u-name">${esc(u.username)}</span>
      <div class="online-dot ${on?'on':''}" title="${on?'En ligne':'Hors ligne'}"></div>
      <button class="dm-btn" onclick="event.stopPropagation();startDM('${encodeURIComponent(JSON.stringify(u))}')">Écrire</button>
    `;
    list.appendChild(item);
  }
  if(list.children.length === 0){
    list.innerHTML='<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:.85rem">Aucun autre utilisateur pour l\'instant</div>';
  }
  document.getElementById('dm-search').value='';
  document.getElementById('modal-dm').style.display='flex';
}

function filterDMUsers(q){
  const query=q.toLowerCase().trim();
  document.querySelectorAll('#dm-user-list .user-item').forEach(item=>{
    const name=item.querySelector('.u-name').textContent.toLowerCase();
    item.style.display=(!query||name.includes(query))?'':'none';
  });
}

async function startDM(user){
  if(typeof user === 'string') user = JSON.parse(decodeURIComponent(user));
  const res=await api('POST','/api/dm',{userId:user.id});
  if(res.error){toast(res.error);return;}
  closeModal('modal-dm');
  // Ajouter à la liste si pas déjà présent
  if(!rooms.find(r=>r.id===res.id)){
    rooms.unshift({id:res.id,name:res.name,is_dm:1,_otherName:user.username,_unread:0});
    renderRoomList();
    socket.emit('join_room',res.id);
  } else {
    const r=rooms.find(x=>x.id===res.id);
    if(r) r._otherName=user.username;
  }

async function api(method, url, body){

      method,
      headers:body?{'Content-Type':'application/json'}:{},

}

function drawEmojiBuilder(){
  const canvas=document.getElementById('emoji-canvas');
  const ctx=canvas.getContext('2d');
  const pos=emojiBuilder.textPos||'center';
  const acc=emojiBuilder.accessory;
  const hasText=!!emojiBuilder.text;
  const isBunny=acc==='bunny-ears';
  const isCat=acc==='cat-ears';

  // Espace supplémentaire : oreilles de lapin au-dessus, texte haut/bas
  const extraTop=isBunny?44:(pos==='top'&&hasText)?36:0;
  const extraBot=(pos==='bottom'&&hasText)?36:0;
  const W=128, H=128+extraTop+extraBot;
  if(canvas.width!==W||canvas.height!==H){ canvas.width=W; canvas.height=H; }
  canvas.style.borderRadius=H>128?'10px':'50%';
  ctx.clearRect(0,0,W,H);

  // Centre du cercle en coordonnées canvas
  const canvasCY=64+extraTop;

  // ── Oreilles de lapin AVANT le cercle (pour dépasser au-dessus) ──
  if(isBunny){
    const ey=canvasCY-56; // sommet du cercle
    ctx.fillStyle='#f0e0e8';
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.ellipse(36,ey,11,34,-.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(92,ey,11,34,.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(255,150,180,0.7)';
    ctx.beginPath(); ctx.ellipse(36,ey,6,24,-.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(92,ey,6,24,.2,0,Math.PI*2); ctx.fill();
  } else if(isCat){
    // Oreilles de chat AVANT le cercle (les pointes dépassent)
    const et=extraTop;
    ctx.fillStyle=emojiBuilder.color;
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(18,46+et); ctx.lineTo(28,10+et); ctx.lineTo(48,38+et); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(110,46+et); ctx.lineTo(100,10+et); ctx.lineTo(80,38+et); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(255,150,180,0.6)';
    ctx.beginPath(); ctx.moveTo(22,42+et); ctx.lineTo(30,18+et); ctx.lineTo(44,36+et); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(106,42+et); ctx.lineTo(98,18+et); ctx.lineTo(84,36+et); ctx.closePath(); ctx.fill();
  }

  // ── Texte en haut (avant translate) ──
  if(pos==='top'&&hasText){
    const t=emojiBuilder.text;
    const fs=t.length<=2?22:t.length<=4?17:13;
    ctx.font=`bold ${fs}px sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t,64,extraTop>0?extraTop/2:18);
  }

  // Décalage pour que le code du visage (coordonnées en 0–128) se positionne correctement
  ctx.save();
  ctx.translate(0,extraTop);

  const cx=64,cy=64,r=56;

  // Cercle de base
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
  ctx.fillStyle=emojiBuilder.color; ctx.fillRect(0,0,128,128);
  if(emojiBuilder.expression==='sick'){
    ctx.fillStyle='rgba(80,200,60,0.2)'; ctx.fillRect(0,0,128,128);
  }
  ctx.restore();

  // Bordure
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=3; ctx.stroke();

  const exp=emojiBuilder.expression;
  ctx.fillStyle='#1a1a1a';
  ctx.strokeStyle='#1a1a1a';
  ctx.lineCap='round';

  // ── Sourcils ──
  if(exp==='angry'){
    ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.moveTo(34,46); ctx.lineTo(50,51); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(94,46); ctx.lineTo(78,51); ctx.stroke();
  } else if(exp==='sad'){
    ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(34,49); ctx.lineTo(50,45); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(94,49); ctx.lineTo(78,45); ctx.stroke();
  }

  // ── Yeux ──
  const eyeY = exp==='surprised'?50:53;
  if(exp==='wink'||exp==='smirk'){
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(34,eyeY); ctx.quadraticCurveTo(41,eyeY-5,48,eyeY); ctx.stroke();
    if(exp!=='smirk'){ ctx.beginPath(); ctx.arc(87,eyeY,5,0,Math.PI*2); ctx.fill(); }
    else { ctx.beginPath(); ctx.arc(87,eyeY,5,0,Math.PI*2); ctx.fill(); }
  } else if(exp==='big-smile'){
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(34,eyeY+2); ctx.quadraticCurveTo(41,eyeY-6,48,eyeY+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(80,eyeY+2); ctx.quadraticCurveTo(87,eyeY-6,94,eyeY+2); ctx.stroke();
  } else if(exp==='sleeping'){
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(34,eyeY+2); ctx.quadraticCurveTo(41,eyeY-4,48,eyeY+2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(80,eyeY+2); ctx.quadraticCurveTo(87,eyeY-4,94,eyeY+2); ctx.stroke();
  } else if(exp==='crazy'){
    ctx.beginPath(); ctx.arc(41,eyeY,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=emojiBuilder.color; ctx.beginPath(); ctx.arc(41,eyeY,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath(); ctx.arc(87,eyeY,5,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(80,eyeY+3); ctx.quadraticCurveTo(87,eyeY-5,94,eyeY+3); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.arc(41,eyeY,exp==='surprised'?7:5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(87,eyeY,exp==='surprised'?7:5,0,Math.PI*2); ctx.fill();
  }

  // ── Bouche ──
  ctx.fillStyle='#1a1a1a'; ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=3.5;
  if(exp==='happy'||exp==='wink'){
    ctx.beginPath(); ctx.arc(cx,67,19,0.18*Math.PI,0.82*Math.PI); ctx.stroke();
  } else if(exp==='big-smile'){
    ctx.beginPath(); ctx.arc(cx,67,20,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,67,20,0.1*Math.PI,0.9*Math.PI); ctx.lineTo(cx-20,67); ctx.closePath(); ctx.clip();
    ctx.fillStyle='#fff'; ctx.fillRect(cx-20,58,40,10);
    ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(cx,58,1.5,10);
    ctx.restore();
  } else if(exp==='sad'){
    ctx.beginPath(); ctx.arc(cx,92,19,1.18*Math.PI,1.82*Math.PI); ctx.stroke();
  } else if(exp==='angry'){
    ctx.beginPath(); ctx.arc(cx,92,16,1.25*Math.PI,1.75*Math.PI); ctx.stroke();
  } else if(exp==='surprised'){
    ctx.beginPath(); ctx.ellipse(cx,84,10,13,0,0,Math.PI*2); ctx.stroke();
  } else if(exp==='sick'){
    ctx.beginPath();
    ctx.moveTo(46,80); ctx.bezierCurveTo(52,74,58,86,64,80);
    ctx.bezierCurveTo(70,74,76,86,82,80); ctx.stroke();
  } else if(exp==='sleeping'){
    ctx.beginPath(); ctx.moveTo(50,80); ctx.lineTo(78,80); ctx.stroke();
    ctx.font='bold 14px sans-serif'; ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('zzz',92,38);
  } else if(exp==='smirk'){
    ctx.beginPath(); ctx.moveTo(50,79); ctx.quadraticCurveTo(67,90,82,76); ctx.stroke();
  } else if(exp==='crazy'){
    ctx.beginPath(); ctx.arc(cx,68,18,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,68,18,0.1*Math.PI,0.9*Math.PI); ctx.lineTo(cx-18,68); ctx.closePath(); ctx.clip();
    ctx.fillStyle='#fff'; ctx.fillRect(cx-18,58,36,10);
    ctx.fillStyle='rgba(0,0,0,0.1)';
    for(let i=0;i<3;i++) ctx.fillRect(cx-12+i*12,58,1.5,10);
    ctx.restore();
  } else {
    ctx.beginPath(); ctx.moveTo(46,79); ctx.lineTo(82,79); ctx.stroke();
  }

  // ── Joues roses ──
  if(['happy','big-smile','wink','crazy'].includes(exp)){
    ctx.fillStyle='rgba(255,150,150,0.35)';
    ctx.beginPath(); ctx.ellipse(28,74,12,8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(100,74,12,8,0,0,Math.PI*2); ctx.fill();
  }

  // ── Accessoire (hors oreilles déjà dessinées avant le cercle) ──
  if(!isBunny&&!isCat){
    if(acc==='glasses'||acc==='sunglasses'){
      if(acc==='sunglasses'){
        ctx.fillStyle='rgba(15,15,35,0.88)';
        ctx.beginPath(); ctx.arc(41,53,13,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(87,53,13,0,Math.PI*2); ctx.fill();
      }
      ctx.strokeStyle='#333'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(41,53,13,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(87,53,13,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(54,53); ctx.lineTo(74,53); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(20,49); ctx.lineTo(28,53); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(108,49); ctx.lineTo(100,53); ctx.stroke();
    } else if(acc==='hat'){
      ctx.fillStyle='#1a1a2e';
      ctx.fillRect(36,24,56,18);
      ctx.fillRect(22,40,84,10);
    } else if(acc==='crown'){
      ctx.fillStyle='#FFD700';
      ctx.beginPath();
      ctx.moveTo(20,36); ctx.lineTo(28,12); ctx.lineTo(44,24);
      ctx.lineTo(64,8); ctx.lineTo(84,24); ctx.lineTo(100,12); ctx.lineTo(108,36);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#b8860b'; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle='#FF6B6B'; ctx.beginPath(); ctx.arc(64,18,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#4ECDC4'; ctx.beginPath(); ctx.arc(36,26,3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(92,26,3,0,Math.PI*2); ctx.fill();
    } else if(acc==='star'){
      ebDrawStar(ctx,64,22,5,14,6,'#FFD700');
      ctx.strokeStyle='#b8860b'; ctx.lineWidth=1; ctx.stroke();
    } else if(acc==='mustache'){
      ctx.fillStyle='#2a1a0a';
      ctx.beginPath();
      ctx.moveTo(cx,75);
      ctx.bezierCurveTo(cx-8,68,cx-26,68,cx-22,76);
      ctx.bezierCurveTo(cx-18,80,cx-10,74,cx,75);
      ctx.bezierCurveTo(cx+10,74,cx+18,80,cx+22,76);
      ctx.bezierCurveTo(cx+26,68,cx+8,68,cx,75);
      ctx.closePath(); ctx.fill();
    }
  }

  // ── Texte centré (à l'intérieur du cercle) ──
  if(pos==='center'&&hasText){
    const t=emojiBuilder.text.slice(0,6);
    const fs=t.length===1?32:t.length===2?24:t.length===3?18:t.length===4?14:t.length===5?12:10;
    ctx.font=`bold ${fs}px sans-serif`;
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t,cx,cy+6);
  }

  ctx.restore(); // fin translate

  // ── Texte en bas ──
  if(pos==='bottom'&&hasText){
    const t=emojiBuilder.text;
    const fs=t.length<=2?22:t.length<=4?17:13;
    ctx.font=`bold ${fs}px sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t,64,128+extraTop+extraBot/2);
  }
}

function ebDrawStar(ctx,cx,cy,spikes,outerR,innerR,color){
  let rot=-Math.PI/2, step=Math.PI/spikes;
  ctx.beginPath(); ctx.moveTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR);
  for(let i=0;i<spikes;i++){
    rot+=step; ctx.lineTo(cx+Math.cos(rot)*innerR, cy+Math.sin(rot)*innerR);
    rot+=step; ctx.lineTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR);
  }
  ctx.closePath(); ctx.fillStyle=color; ctx.fill();
}

let mediaRecorder = null;
let audioChunks   = [];
let isRecording   = false;

function getBestMimeType(){
  for(const t of ['audio/webm','audio/mp4','audio/ogg;codecs=opus','audio/ogg',''	]){
    if(!t || MediaRecorder.isTypeSupported(t)) return t;
  }
  return '';
}

async function toggleVoiceRecord(){
  if(isRecording){ stopVoiceRecord(); return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks = [];
    const mimeType = getBestMimeType();
    mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : {});
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = ()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob = new Blob(audioChunks, {type:mimeType});
      const reader = new FileReader();
      reader.onload = e => {
        if(currentRoomId && socket) socket.emit('send_message',{roomId:currentRoomId, content:e.target.result});
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
    isRecording = true;
    const btn = document.getElementById('btn-voice');
    btn.classList.add('recording');
    btn.title = 'Arrêter l\'enregistrement';
    setTimeout(()=>{ if(isRecording) stopVoiceRecord(); }, 60000);
  }catch(e){ toast('Micro non disponible'); }
}

function stopVoiceRecord(){
  if(!mediaRecorder) return;
  mediaRecorder.stop();
  isRecording = false;
  const btn = document.getElementById('btn-voice');
  btn.classList.remove('recording');
  btn.title = 'Message vocal';
}

let pendingKickRoomId = null;

// ── Menu contextuel messages ──────────────────────────────
function saveHidden(){ localStorage.setItem('hiddenMsgs', JSON.stringify([...hiddenMessages])); }

function buildMsgMenu(msgId, roomId, isOwn){
  closeMsgMenu();
  const menu = document.createElement('div');
  menu.className='msg-menu';
  menu.id='active-msg-menu';
  if(isOwn){
    const del = document.createElement('button');
    del.textContent='🗑 Supprimer pour tous';
    del.onclick=()=>{ closeMsgMenu(); if(confirm('Supprimer ce message pour tout le monde ?')) socket.emit('delete_message',{messageId:msgId,roomId}); };
    menu.appendChild(del);
  }
  const hide = document.createElement('button');
  hide.textContent='🙈 Masquer pour moi';
  hide.onclick=()=>{ closeMsgMenu(); hideMsg(msgId); };
  menu.appendChild(hide);
  document.body.appendChild(menu);
  return menu;
}

function showMsgMenu(e, msgId, roomId, isOwn){
  e.preventDefault(); e.stopPropagation();
  const menu = buildMsgMenu(msgId, roomId, isOwn);
  let top = e.clientY+4;
  let left = e.clientX;
  if(left+160>window.innerWidth) left=window.innerWidth-164;
  if(top+80>window.innerHeight) top=e.clientY-84;
  menu.style.top=top+'px'; menu.style.left=left+'px';
}

function showMsgMenuTouch(msgId, roomId, isOwn){
  const menu = buildMsgMenu(msgId, roomId, isOwn);
  menu.style.top='50%'; menu.style.left='50%';
  menu.style.transform='translate(-50%,-50%)';
}
function closeMsgMenu(){ document.getElementById('active-msg-menu')?.remove(); }
document.addEventListener('click', closeMsgMenu);

function hideMsg(msgId){
  hiddenMessages.add(msgId);
  saveHidden();
  const bubble = document.querySelector(`.msg-bubble[data-msg-id="${msgId}"]`);
  if(!bubble) return;
  const ph = document.createElement('span');
  ph.className='msg-hidden-placeholder';
  ph.textContent='Message masqué • Afficher';
  ph.onclick=()=>showMsg(msgId, bubble, ph);
  bubble.style.display='none';
  bubble.parentNode.insertBefore(ph, bubble);
}

function showMsg(msgId, bubble, ph){
  hiddenMessages.delete(msgId);
  saveHidden();
  ph.remove();
  bubble.style.display='';
}

async function openMembersList(){

  if(!r || r.is_dm) return;
  const members = await api('GET', `/api/rooms/${currentRoomId}/members`);
  const list = document.getElementById('members-list');
  list.innerHTML='';
  const isCreator = r.created_by === me.id;
  for(const m of members){
    const item = document.createElement('div');
    item.className='user-item';
    const on=onlineIds.has(m.id);
    item.innerHTML=`
      <span style="font-size:1.3rem">${renderAvatar(m.avatar)}</span>
      <span class="u-name">${esc(m.username)}${m.id===r.created_by?' 👑':''}</span>
      <div class="online-dot ${on?'on':''}" title="${on?'En ligne':'Hors ligne'}"></div>
      ${isCreator && m.id!==me.id?`<button class="dm-btn" style="background:var(--danger)" onclick="requestKick(${m.id},'${esc(m.username)}')">✖</button>`:''}
    `;
    list.appendChild(item);
  }
  document.getElementById('modal-members').style.display='flex';
}

function requestKick(userId, username){
  if(!confirm(`Demander à ${username} de quitter le salon ?`)) return;
  socket.emit('kick_request', { roomId: currentRoomId, targetId: userId });
  closeModal('modal-members');
  toast(`Demande envoyée à ${username}`);
}

function respondKick(accept){
  socket.emit(accept ? 'kick_accept' : 'kick_refuse', { roomId: pendingKickRoomId });
  document.getElementById('kick-notif').style.display='none';
  pendingKickRoomId=null;
}

async function openAddMember(){
  if(!currentRoomId) return;
  const allUsers = await api('GET', '/api/users');
  const members = await api('GET', `/api/rooms/${currentRoomId}/members`);
  const memberIds = new Set(members.map(m => m.id));
  const nonMembers = allUsers.filter(u => !memberIds.has(u.id));
  const list = document.getElementById('add-member-list');
  list.innerHTML = '';
  if(!nonMembers.length){ list.innerHTML = '<p style="color:var(--muted);text-align:center">Tout le monde est déjà dans le groupe</p>'; }
  for(const u of nonMembers){
    const item = document.createElement('div');
    item.className = 'user-item';
    const on = onlineIds.has(u.id);
    item.innerHTML = `
      <span style="font-size:1.3rem">${renderAvatar(u.avatar)}</span>
      <span class="u-name">${esc(u.username)}</span>
      <div class="online-dot ${on?'on':''}" title="${on?'En ligne':'Hors ligne'}"></div>
      <button class="dm-btn" onclick="addMemberToRoom(${u.id}, this)">Ajouter</button>
    `;
    list.appendChild(item);
  }
  document.getElementById('modal-add-member').style.display = 'flex';
}

async function addMemberToRoom(userId, btn){
  btn.disabled = true;
  btn.textContent = '...';
  const res = await api('POST', `/api/rooms/${currentRoomId}/members`, { userId });
  if(res.ok){
    btn.textContent = '✓';
    const members = await api('GET', `/api/rooms/${currentRoomId}/members`);
    if(Array.isArray(members)){
      const onlineCount = members.filter(m=>onlineIds.has(m.id)).length;
      document.getElementById('chat-members-count').textContent = `👥 ${members.length} membres • ${onlineCount} en ligne`;
    }
  } else {
    btn.textContent = res.error || 'Erreur';
  }
}
