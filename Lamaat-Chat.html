<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<title>Lamaat Chat</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --border:#30363d;
  --primary:#FFD93D; --primary-dark:#e6c235;
  --text:#e6edf3; --text-muted:#8b949e;
  --bubble-me:#1f6feb; --bubble-other:#21262d;
  --online:#3fb950; --danger:#f85149;
  --radius:14px; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}

/* ── AUTH ───────────────────────────────────────────────── */
#auth{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
#auth-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:100%;max-width:380px}
#auth-box h1{font-size:1.5rem;margin-bottom:4px;color:var(--primary)}
#auth-box p{color:var(--text-muted);font-size:.85rem;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.82rem;color:var(--text-muted);margin-bottom:5px}
.field input{width:100%;background:#0d1117;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:1rem;outline:none}
.field input:focus{border-color:var(--primary)}
.avatar-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.av-opt{font-size:1.4rem;cursor:pointer;padding:4px;border-radius:6px;border:2px solid transparent;transition:border-color .15s}
.av-opt.selected{border-color:var(--primary)}
.btn{width:100%;background:var(--primary);color:#000;border:none;padding:11px;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}
.btn:active{background:var(--primary-dark)}
.auth-switch{text-align:center;margin-top:12px;font-size:.85rem;color:var(--text-muted)}
.auth-switch a{color:var(--primary);cursor:pointer;text-decoration:none}
.err{color:var(--danger);font-size:.82rem;margin-top:6px;min-height:18px}

/* ── LAYOUT ─────────────────────────────────────────────── */
#app{display:none;height:100%;flex-direction:column}
#app.visible{display:flex}

/* Mobile : sidebar en overlay */
#layout{display:flex;flex:1;overflow:hidden}
#sidebar{
  width:280px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform .25s;
}
@media(max-width:640px){
  #sidebar{position:fixed;inset:0;right:auto;z-index:50;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49;display:none}
  #overlay.visible{display:block}
}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar-header{padding:14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
#my-avatar{font-size:1.4rem}
#my-name{font-weight:600;flex:1}
#btn-logout{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;padding:4px}
#btn-logout:hover{color:var(--danger)}

#rooms-list{flex:1;overflow-y:auto;padding:8px 0}
.room-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;
  border-radius:8px;margin:2px 6px;transition:background .15s;position:relative;
}
.room-item:hover,.room-item.active{background:rgba(255,255,255,0.05)}
.room-item.active{background:rgba(255,211,61,0.1)}
.room-icon{font-size:1.3rem;flex-shrink:0}
.room-info{flex:1;min-width:0}
.room-name{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-last{font-size:.75rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-unread{background:var(--primary);color:#000;border-radius:10px;padding:1px 7px;font-size:.72rem;font-weight:700;flex-shrink:0}

#sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px}
#sidebar-footer button{flex:1;background:#21262d;border:1px solid var(--border);color:var(--text);padding:7px;border-radius:8px;cursor:pointer;font-size:.8rem}
#sidebar-footer button:hover{border-color:var(--primary);color:var(--primary)}

/* ── CHAT ────────────────────────────────────────────────── */
#chat-panel{flex:1;display:flex;flex-direction:column;min-width:0}
#chat-header{
  padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
#btn-menu{display:none;background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;padding:4px}
@media(max-width:640px){#btn-menu{display:block}}
#chat-room-name{font-weight:600;flex:1}
#chat-members-count{font-size:.8rem;color:var(--text-muted)}

#messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg-group{display:flex;flex-direction:column;gap:2px;max-width:80%}
.msg-group.me{align-self:flex-end;align-items:flex-end}
.msg-group.other{align-self:flex-start;align-items:flex-start}
.msg-sender{font-size:.72rem;color:var(--text-muted);margin-bottom:2px;padding:0 4px}
.msg-bubble{
  padding:8px 12px;border-radius:18px;font-size:.92rem;line-height:1.4;
  word-break:break-word;max-width:100%;
}
.msg-group.me .msg-bubble{background:var(--bubble-me);border-bottom-right-radius:4px;color:#fff}
.msg-group.other .msg-bubble{background:var(--bubble-other);border-bottom-left-radius:4px}
.msg-time{font-size:.65rem;color:var(--text-muted);padding:0 4px}

.date-sep{text-align:center;font-size:.72rem;color:var(--text-muted);margin:8px 0;position:relative}
.date-sep::before,.date-sep::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--border)}
.date-sep::before{left:0} .date-sep::after{right:0}

#typing-indicator{padding:4px 12px;font-size:.78rem;color:var(--text-muted);min-height:20px;font-style:italic}

#input-bar{
  padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:flex-end;gap:8px;
}
#msg-input{
  flex:1;background:#0d1117;border:1px solid var(--border);color:var(--text);
  padding:9px 12px;border-radius:20px;font-size:.95rem;outline:none;resize:none;
  max-height:120px;overflow-y:auto;font-family:var(--font);line-height:1.4;
}
#msg-input:focus{border-color:var(--primary)}
#btn-send{
  background:var(--primary);color:#000;border:none;width:38px;height:38px;
  border-radius:50%;cursor:pointer;font-size:1.1rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#btn-send:active{background:var(--primary-dark)}

/* ── EMPTY STATE ─────────────────────────────────────────── */
#empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:10px}
#empty-chat .big{font-size:3rem}

/* ── MODALS ──────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;width:100%;max-width:360px}
.modal h3{margin-bottom:14px;color:var(--primary)}
.modal input{width:100%;background:#0d1117;border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:.95rem;outline:none;margin-bottom:10px}
.modal input:focus{border-color:var(--primary)}
.modal .btn-row{display:flex;gap:8px;margin-top:4px}
.modal .btn-row button{flex:1;padding:9px;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600}
.modal .btn-row .ok{background:var(--primary);color:#000}
.modal .btn-row .cancel{background:#21262d;color:var(--text);border:1px solid var(--border)}
.user-list{max-height:200px;overflow-y:auto;margin-bottom:10px}
.user-list{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.user-item{
  display:flex;align-items:center;gap:10px;padding:11px 12px;
  cursor:pointer;border-bottom:1px solid var(--border);
  background:var(--bg);transition:background .15s;user-select:none;
}
.user-item:last-child{border-bottom:none}
.user-item:hover{background:#161b22}
.user-item.selected{background:#0f1e0f}
.user-item .u-name{flex:1;font-size:.95rem;font-weight:500}
.user-item .u-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;transition:background .15s,border-color .15s}
.user-item.selected .u-check{background:var(--primary);border-color:var(--primary);color:#000}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.online-dot.on{background:var(--online)}
.dm-btn{background:var(--primary);color:#000;border:none;border-radius:6px;padding:5px 12px;font-size:.8rem;font-weight:700;cursor:pointer;flex-shrink:0}
.dm-btn:active{background:var(--primary-dark)}

/* Toast */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#21262d;border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:20px;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none}
#toast.show{opacity:1}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div id="auth-box">
    <h1>💬 Lamaat Chat</h1>
    <p id="auth-subtitle">Connecte-toi pour rejoindre tes potes</p>

    <div id="form-login">
      <div class="field"><label>Pseudo</label><input id="l-user" type="text" autocomplete="username" placeholder="Ton pseudo"></div>
      <div class="field"><label>Mot de passe</label><input id="l-pass" type="password" autocomplete="current-password" placeholder="••••••"></div>
      <div class="err" id="l-err"></div>
      <button class="btn" onclick="doLogin()">Connexion</button>
      <div class="auth-switch">Pas de compte ? <a onclick="showRegister()">S'inscrire</a></div>
    </div>

    <div id="form-register" style="display:none">
      <div class="field"><label>Pseudo (2-20 caractères)</label><input id="r-user" type="text" autocomplete="username" placeholder="Ton pseudo"></div>
      <div class="field"><label>Mot de passe</label><input id="r-pass" type="password" autocomplete="new-password" placeholder="Min 4 caractères"></div>
      <div class="field"><label>Ton avatar</label>
        <div class="avatar-row" id="avatar-row"></div>
      </div>
      <div class="err" id="r-err"></div>
      <button class="btn" onclick="doRegister()">Créer le compte</button>
      <div class="auth-switch">Déjà inscrit ? <a onclick="showLogin()">Se connecter</a></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="overlay" onclick="closeSidebar()"></div>
  <div id="layout">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-header">
        <div id="my-avatar">😀</div>
        <div id="my-name">—</div>
        <button id="btn-logout" title="Déconnexion" onclick="doLogout()">⏻</button>
      </div>
      <div style="padding:8px 10px;border-bottom:1px solid var(--border)">
        <input id="sidebar-search" type="text" placeholder="🔍 Rechercher..."
          oninput="filterSidebar(this.value)"
          style="width:100%;background:#21262d;border:1px solid #444d56;color:var(--text);
                 padding:8px 12px;border-radius:20px;font-family:var(--font);font-size:.85rem;
                 outline:none;transition:border-color .2s"
          onfocus="this.style.borderColor='#FFD93D'" onblur="this.style.borderColor='#444d56'">
      </div>
      <div id="rooms-list"></div>
      <div id="sidebar-footer">
        <button onclick="openNewGroup()">+ Groupe</button>
        <button onclick="openNewDM()">+ Message privé</button>
      </div>
    </div>

    <!-- CHAT -->
    <div id="chat-panel">
      <div id="chat-header">
        <button id="btn-menu" onclick="openSidebar()">☰</button>
        <div id="chat-room-name">Sélectionne un salon</div>
        <div id="chat-members-count"></div>
      </div>

      <div id="messages"></div>
      <div id="typing-indicator"></div>

      <div id="input-bar">
        <textarea id="msg-input" placeholder="Message..." rows="1" oninput="autoResize(this)" onkeydown="onKey(event)"></textarea>
        <button id="btn-send" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL GROUPE -->
<div class="modal-bg" id="modal-group" style="display:none">
  <div class="modal">
    <h3>Nouveau groupe</h3>
    <input id="group-name" type="text" placeholder="Nom du groupe">
    <div style="position:relative;margin-bottom:8px">
      <input id="group-search" type="text" placeholder="🔍 Rechercher un membre..." oninput="filterGroupUsers(this.value)" style="padding-right:36px">
    </div>
    <div class="user-list" id="group-user-list"></div>
    <div class="btn-row">
      <button class="cancel" onclick="closeModal('modal-group')">Annuler</button>
      <button class="ok" onclick="createGroup()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL DM -->
<div class="modal-bg" id="modal-dm" style="display:none">
  <div class="modal">
    <h3>Message privé</h3>
    <input id="dm-search" type="text" placeholder="🔍 Rechercher..." oninput="filterDMUsers(this.value)">
    <div class="user-list" id="dm-user-list"></div>
    <div class="btn-row">
      <button class="cancel" onclick="closeModal('modal-dm')">Annuler</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ═══════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════
let me = null;         // utilisateur connecté
let socket = null;
let rooms  = [];
let currentRoomId = null;
let onlineIds = new Set();
let typingTimers = {};
let selectedAvatar = '😀';

const AVATARS = ['😀','😎','🤩','🥷','🧙','🦊','🐼','🐸','👾','🤖','🦁','🐯'];

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
function showLogin(){ document.getElementById('form-login').style.display=''; document.getElementById('form-register').style.display='none'; }
function showRegister(){
  document.getElementById('form-login').style.display='none';
  document.getElementById('form-register').style.display='';
  buildAvatarRow();
}

function buildAvatarRow(){
  const row = document.getElementById('avatar-row');
  row.innerHTML = '';
  for(const av of AVATARS){
    const span = document.createElement('span');
    span.className = 'av-opt' + (av===selectedAvatar?' selected':'');
    span.textContent = av;
    span.onclick = ()=>{ selectedAvatar=av; document.querySelectorAll('.av-opt').forEach(s=>s.classList.remove('selected')); span.classList.add('selected'); };
    row.appendChild(span);
  }
}

async function doLogin(){
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  document.getElementById('l-err').textContent='';
  const res = await api('POST','/api/login',{username,password});
  if(res.error){ document.getElementById('l-err').textContent=res.error; return; }
  me = res.user;
  enterApp();
}

async function doRegister(){
  const username = document.getElementById('r-user').value.trim();
  const password = document.getElementById('r-pass').value;
  document.getElementById('r-err').textContent='';
  const res = await api('POST','/api/register',{username,password,avatar:selectedAvatar});
  if(res.error){ document.getElementById('r-err').textContent=res.error; return; }
  me = res.user;
  enterApp();
}

async function doLogout(){
  await api('POST','/api/logout');
  if(socket) socket.disconnect();
  me=null; currentRoomId=null; rooms=[];
  document.getElementById('app').classList.remove('visible');
  document.getElementById('auth').style.display='flex';
}

// ═══════════════════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════════════════
async function enterApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('my-avatar').textContent = me.avatar;
  document.getElementById('my-name').textContent   = me.username;
  await loadRooms();
  connectSocket();
}

async function checkSession(){
  const res = await api('GET','/api/me');
  if(res.id){ me=res; enterApp(); }
}

async function loadRooms(){
  const data = await api('GET','/api/rooms');
  if(!Array.isArray(data)) return;
  rooms = data;
  renderRoomList();
}

// ═══════════════════════════════════════════════════
// SOCKET.IO
// ═══════════════════════════════════════════════════
function connectSocket(){
  const token = getCookie('token');
  socket = io({ auth:{ token } });

  socket.on('connect_error', e => console.warn('Socket error:', e.message));

  socket.on('message', msg => {
    if(msg.room_id === currentRoomId) appendMessage(msg);
    // Marquer non lu si pas la salle active
    if(msg.room_id !== currentRoomId) markUnread(msg.room_id);
    // Mettre à jour l'aperçu dans la liste
    updateRoomPreview(msg);
  });

  socket.on('online', ids => {
    onlineIds = new Set(ids);
    renderRoomList();
  });

  socket.on('room_added', room => {
    // Ne pas dupliquer si déjà dans la liste
    if (rooms.find(r => r.id === room.id)) return;
    rooms.unshift({ ...room, _unread: 0 });
    renderRoomList();
  });

  socket.on('typing', ({userId, username, typing})=>{
    if(!typing){ clearTyping(userId); return; }
    showTyping(userId, username);
    clearTimeout(typingTimers[userId]);
    typingTimers[userId] = setTimeout(()=>clearTyping(userId), 3000);
  });
}

// ═══════════════════════════════════════════════════
// SALONS
// ═══════════════════════════════════════════════════
function renderRoomList(){
  const list = document.getElementById('rooms-list');
  list.innerHTML='';
  for(const r of rooms){
    const div = document.createElement('div');
    div.className = 'room-item' + (r.id===currentRoomId?' active':'');
    div.dataset.id = r.id;

    const icon = getRoomIcon(r);
    const displayName = getRoomDisplayName(r);

    div.innerHTML = `
      <div class="room-icon">${icon}</div>
      <div class="room-info">
        <div class="room-name">${esc(displayName)}</div>
        <div class="room-last" id="room-last-${r.id}"></div>
      </div>
      ${r._unread?`<div class="room-unread">${r._unread}</div>`:''}
    `;
    div.onclick = ()=>{ openRoom(r.id); closeSidebar(); };
    list.appendChild(div);
  }
}

function getRoomDisplayName(r){
  if(!r.is_dm) return r.name;
  return r._otherName || 'Message privé';
}

function getRoomIcon(r){
  if(!r.is_dm) return r.name==='Général' ? '📢' : '💬';
  return r._otherAvatar || '👤';
}

function filterSidebar(q){
  const query = q.toLowerCase().trim();
  document.querySelectorAll('#rooms-list .room-item').forEach(item => {
    const name = item.querySelector('.room-name')?.textContent.toLowerCase() || '';
    item.style.display = (!query || name.includes(query)) ? '' : 'none';
  });
}

function updateRoomPreview(msg){
  const el = document.getElementById(`room-last-${msg.room_id}`);
  if(el) el.textContent = `${msg.username}: ${msg.content}`.slice(0,40);
}

function markUnread(roomId){
  const r = rooms.find(x=>x.id===roomId);
  if(!r) return;
  r._unread = (r._unread||0)+1;
  renderRoomList();
}

async function openRoom(roomId){
  currentRoomId = roomId;
  const r = rooms.find(x=>x.id===roomId);
  if(r) r._unread=0;
  renderRoomList();

  document.getElementById('chat-room-name').textContent = r ? getRoomDisplayName(r) : '—';
  document.getElementById('messages').innerHTML='';
  document.getElementById('typing-indicator').textContent='';

  const msgs = await api('GET',`/api/rooms/${roomId}/messages`);
  if(Array.isArray(msgs)) renderMessages(msgs);

  const members = await api('GET',`/api/rooms/${roomId}/members`);
  if(Array.isArray(members)){
    const onlineCount = members.filter(m=>onlineIds.has(m.id)).length;
    document.getElementById('chat-members-count').textContent = `${members.length} membres • ${onlineCount} en ligne`;
  }

  document.getElementById('msg-input').focus();
}

// ═══════════════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════════════
let lastRenderedDate = null;
let lastRenderedUser = null;

function renderMessages(msgs){
  document.getElementById('messages').innerHTML='';
  lastRenderedDate=null; lastRenderedUser=null;
  for(const m of msgs) appendMessage(m, true);
  scrollToBottom();
}

function appendMessage(msg, noScroll){
  const box = document.getElementById('messages');
  const date = new Date(msg.sent_at*1000);
  const dateStr = date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  // Séparateur de date
  if(dateStr !== lastRenderedDate){
    const sep = document.createElement('div');
    sep.className='date-sep'; sep.textContent=dateStr;
    box.appendChild(sep);
    lastRenderedDate=dateStr;
    lastRenderedUser=null;
  }

  const isMe = msg.user_id === me.id;
  const sameUser = msg.user_id === lastRenderedUser;

  // Regrouper les messages consécutifs du même auteur
  let group = !sameUser ? null : box.querySelector(`.msg-group[data-uid="${msg.user_id}"]:last-child`);
  if(!group || !sameUser){
    group = document.createElement('div');
    group.className = `msg-group ${isMe?'me':'other'}`;
    group.dataset.uid = msg.user_id;
    if(!isMe && !sameUser){
      const sender = document.createElement('div');
      sender.className='msg-sender';
      sender.textContent=`${msg.avatar} ${msg.username}`;
      group.appendChild(sender);
    }
    box.appendChild(group);
    lastRenderedUser = msg.user_id;
  }

  const bubble = document.createElement('div');
  bubble.className='msg-bubble';
  bubble.textContent=msg.content;
  group.appendChild(bubble);

  const time = document.createElement('div');
  time.className='msg-time';
  time.textContent=date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  group.appendChild(time);

  if(!noScroll) scrollToBottom();
}

function scrollToBottom(){
  const box=document.getElementById('messages');
  box.scrollTop=box.scrollHeight;
}

// ═══════════════════════════════════════════════════
// ENVOI
// ═══════════════════════════════════════════════════
let typingSent = false;
let typingClearTimer = null;

function sendMessage(){
  if(!currentRoomId||!socket) return;
  const input=document.getElementById('msg-input');
  const content=input.value.trim();
  if(!content) return;
  socket.emit('send_message',{roomId:currentRoomId,content});
  input.value=''; autoResize(input);
  socket.emit('typing',{roomId:currentRoomId,typing:false});
  typingSent=false;
}

function onKey(e){
  // Envoi avec Entrée (sans Shift)
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); return; }
  // Indicateur de frappe
  if(!typingSent&&socket&&currentRoomId){
    socket.emit('typing',{roomId:currentRoomId,typing:true}); typingSent=true;
  }
  clearTimeout(typingClearTimer);
  typingClearTimer=setTimeout(()=>{
    if(socket&&currentRoomId) socket.emit('typing',{roomId:currentRoomId,typing:false});
    typingSent=false;
  },2000);
}

function autoResize(el){
  el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ═══════════════════════════════════════════════════
// TYPING
// ═══════════════════════════════════════════════════
const typingUsers={};
function showTyping(userId,username){
  typingUsers[userId]=username;
  renderTyping();
}
function clearTyping(userId){
  delete typingUsers[userId];
  renderTyping();
}
function renderTyping(){
  const names=Object.values(typingUsers);
  const el=document.getElementById('typing-indicator');
  if(!names.length){el.textContent='';return;}
  el.textContent=names.length===1?`${names[0]} est en train d'écrire…`:`${names.join(', ')} écrivent…`;
}

// ═══════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════
async function openNewGroup(){
  const users = await api('GET','/api/users');
  const list = document.getElementById('group-user-list');
  list.innerHTML='';
  for(const u of users){
    if(u.id===me.id) continue;
    const item=document.createElement('div');
    item.className='user-item';
    item.dataset.uid=u.id;
    const on=onlineIds.has(u.id);
    item.innerHTML=`
      <span style="font-size:1.3rem">${u.avatar}</span>
      <span class="u-name">${esc(u.username)}</span>
      <div class="online-dot ${on?'on':''}" title="${on?'En ligne':'Hors ligne'}"></div>
      <div class="u-check">✓</div>
    `;
    item.onclick=()=>item.classList.toggle('selected');
    list.appendChild(item);
  }
  document.getElementById('group-name').value='';
  document.getElementById('group-search').value='';
  document.getElementById('modal-group').style.display='flex';
  document.getElementById('group-search').focus();
}

function filterGroupUsers(q){
  const query=q.toLowerCase().trim();
  document.querySelectorAll('#group-user-list .user-item').forEach(item=>{
    const name=item.querySelector('.u-name').textContent.toLowerCase();
    item.style.display=(!query||name.includes(query))?'':'none';
  });
}

async function createGroup(){
  const name=document.getElementById('group-name').value.trim();
  if(!name){toast('Entre un nom de groupe');return;}
  const checked=[...document.querySelectorAll('#group-user-list .user-item.selected')].map(i=>parseInt(i.dataset.uid));
  const res=await api('POST','/api/rooms',{name,members:checked});
  if(res.error){toast(res.error);return;}
  rooms.unshift({...res,is_dm:0,_unread:0});
  renderRoomList();
  socket.emit('join_room',res.id);
  openRoom(res.id);
  closeModal('modal-group');
}

async function openNewDM(){
  const users = await api('GET','/api/users');
  const list=document.getElementById('dm-user-list');
  list.innerHTML='';
  for(const u of users){
    if(u.id===me.id) continue;
    const item=document.createElement('div');
    item.className='user-item';
    const on=onlineIds.has(u.id);
    item.innerHTML=`
      <span style="font-size:1.3rem">${u.avatar}</span>
      <span class="u-name">${esc(u.username)}</span>
      <div class="online-dot ${on?'on':''}" title="${on?'En ligne':'Hors ligne'}"></div>
      <button class="dm-btn" onclick="event.stopPropagation();startDM(${JSON.stringify(u)})">Écrire</button>
    `;
    list.appendChild(item);
  }
  if(list.children.length === 0){
    list.innerHTML='<div style="padding:14px;text-align:center;color:var(--text-muted);font-size:.85rem">Aucun autre utilisateur pour l\'instant</div>';
  }
  document.getElementById('dm-search').value='';
  document.getElementById('modal-dm').style.display='flex';
}

function filterDMUsers(q){
  const query=q.toLowerCase().trim();
  document.querySelectorAll('#dm-user-list .user-item').forEach(item=>{
    const name=item.querySelector('.u-name').textContent.toLowerCase();
    item.style.display=(!query||name.includes(query))?'':'none';
  });
}

async function startDM(user){
  if(typeof user === 'string') user = JSON.parse(user);
  const res=await api('POST','/api/dm',{userId:user.id});
  if(res.error){toast(res.error);return;}
  closeModal('modal-dm');
  // Ajouter à la liste si pas déjà présent
  if(!rooms.find(r=>r.id===res.id)){
    rooms.unshift({id:res.id,name:res.name,is_dm:1,_otherName:user.username,_unread:0});
    renderRoomList();
    socket.emit('join_room',res.id);
  } else {
    const r=rooms.find(x=>x.id===res.id);
    if(r) r._otherName=user.username;
  }
  openRoom(res.id);
}

function closeModal(id){ document.getElementById(id).style.display='none'; }

// ═══════════════════════════════════════════════════
// SIDEBAR MOBILE

function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('visible'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('visible'); }

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
async function api(method, url, body){
  try{
    const res=await fetch(url,{
      method,
      headers:body?{'Content-Type':'application/json'}:{},
      body:body?JSON.stringify(body):undefined,
    });
    return await res.json();
  }catch{ return {error:'Erreur réseau'}; }
}

function getCookie(name){
  const m=document.cookie.match(new RegExp('(?:^|; )'+name+'=([^;]*)'));
  return m?decodeURIComponent(m[1]):null;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let toastTimer;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2500); }

checkSession();

// PWA install
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
